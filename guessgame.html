<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Wordle | Aurora Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #312e81);
            --tile-bg: rgba(255, 255, 255, 0.05);
            --tile-border: rgba(255, 255, 255, 0.2);
            --correct: linear-gradient(135deg, #22c55e, #16a34a);
            --present: linear-gradient(135deg, #eab308, #ca8a04);
            --absent: #334155;
            --text-main: #ffffff;
            --accent-glow: rgba(0, 242, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            /* Prevents gray box when tapping on mobile */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            /* Fixes the mobile height issue */
            height: 100vh;
            height: 100dvh; 
            display: flex;
            justify-content: center;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            /* This ensures everything stays spread out */
            justify-content: space-between; 
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-top: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Shrink the grid slightly so keyboard has more room */
        #game-board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            flex-grow: 0;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: clamp(45px, 12vw, 55px);
            height: clamp(45px, 12vw, 55px);
            border: 2px solid var(--tile-border);
            border-radius: 10px;
            background: var(--tile-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* KEYBOARD: Optimized for Mobile Taps */
        #keyboard {
            width: 100%;
            padding-bottom: 10px;
        }

        .kb-row {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 6px;
        }

        .key {
            background: rgba(255, 255, 255, 0.12);
            border: none;
            color: white;
            /* Taller buttons for easier tapping */
            height: 55px; 
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.1s;
        }

        .key:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .key.large {
            flex: 1.5;
            font-size: 0.75rem;
        }

        /* CREDIT SECTION: Always visible now */
        .dev-credit {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            padding-bottom: 5px;
            text-align: center;
        }

        .dev-name {
            display: block;
            font-weight: 600;
            color: #00F2FF;
            text-shadow: 0 0 8px rgba(0, 242, 255, 0.4);
        }

        /* Message pop-up */
        #message {
            position: fixed;
            top: 15%;
            background: white;
            color: black;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="message"></div>

    <div class="container">
        <h1>WORDLE</h1>
        
        <div id="game-board"></div>

        <div id="keyboard-wrapper" style="width: 100%;">
            <div id="keyboard">
                <div class="kb-row">
                    <button class="key" data-key="Q">Q</button>
                    <button class="key" data-key="W">W</button>
                    <button class="key" data-key="E">E</button>
                    <button class="key" data-key="R">R</button>
                    <button class="key" data-key="T">T</button>
                    <button class="key" data-key="Y">Y</button>
                    <button class="key" data-key="U">U</button>
                    <button class="key" data-key="I">I</button>
                    <button class="key" data-key="O">O</button>
                    <button class="key" data-key="P">P</button>
                </div>
                <div class="kb-row">
                    <button class="key" data-key="A">A</button>
                    <button class="key" data-key="S">S</button>
                    <button class="key" data-key="D">D</button>
                    <button class="key" data-key="F">F</button>
                    <button class="key" data-key="G">G</button>
                    <button class="key" data-key="H">H</button>
                    <button class="key" data-key="J">J</button>
                    <button class="key" data-key="K">K</button>
                    <button class="key" data-key="L">L</button>
                </div>
                <div class="kb-row">
                    <button class="key large" data-key="ENTER">ENTER</button>
                    <button class="key" data-key="Z">Z</button>
                    <button class="key" data-key="X">X</button>
                    <button class="key" data-key="C">C</button>
                    <button class="key" data-key="V">V</button>
                    <button class="key" data-key="B">B</button>
                    <button class="key" data-key="N">N</button>
                    <button class="key" data-key="M">M</button>
                    <button class="key large" data-key="BACKSPACE">⌫</button>
                </div>
            </div>

            <div class="dev-credit">
                Developed by <span class="dev-name">Thanmai Lohith DeSouza</span>
            </div>
        </div>
    </div>
